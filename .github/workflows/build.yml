name: Build Sandbox Validator

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            ext: .exe
            asset_name: 沙盘校验工具_windows
          - os: macos-latest
            ext: ''
            asset_name: 沙盘校验工具_macos
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install openpyxl pyinstaller
      
      - name: Build executable
        run: pyinstaller --onefile --windowed --name "沙盘校验工具" sandbox_validator_gui.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/沙盘校验工具${{ matrix.ext }}
